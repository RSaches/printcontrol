[env]
SQLX_OFFLINE = "true"

# DT_RPATH (--disable-new-dtags) tem prioridade MAIOR que LD_LIBRARY_PATH,
# garantindo que libs do sistema sejam usadas mesmo quando snap injeta caminhos antigos.
[target.x86_64-unknown-linux-gnu]
rustflags = [
  "-C", "link-arg=-Wl,--disable-new-dtags,-rpath,/usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu",
]
