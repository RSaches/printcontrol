<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!-- Fundo com gradiente azul -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Corpo da impressora -->
  <rect x="232" y="380" width="560" height="320" rx="40" fill="white" opacity="0.95"/>

  <!-- Bandeja superior (papel entrando) -->
  <rect x="312" y="260" width="400" height="140" rx="20" fill="white" opacity="0.85"/>
  <!-- Linha do papel -->
  <rect x="352" y="296" width="320" height="12" rx="6" fill="#3B82F6" opacity="0.5"/>
  <rect x="352" y="328" width="260" height="12" rx="6" fill="#3B82F6" opacity="0.35"/>
  <rect x="352" y="360" width="200" height="12" rx="6" fill="#3B82F6" opacity="0.2"/>

  <!-- Slot de saída do papel -->
  <rect x="312" y="680" width="400" height="16" rx="8" fill="#1D4ED8" opacity="0.3"/>

  <!-- Botão power na impressora -->
  <circle cx="700" cy="500" r="28" fill="#3B82F6" opacity="0.8"/>
  <circle cx="700" cy="500" r="18" fill="white" opacity="0.9"/>

  <!-- Luzes de status -->
  <circle cx="620" cy="500" r="12" fill="#22C55E"/>
  <circle cx="652" cy="500" r="12" fill="#3B82F6" opacity="0.6"/>

  <!-- Check de confirmação (canto inferior direito) -->
  <circle cx="756" cy="756" r="140" fill="url(#check-bg)"/>
  <circle cx="756" cy="756" r="130" fill="#22C55E"/>
  <polyline
    points="696,756 736,800 820,708"
    stroke="white"
    stroke-width="52"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="check-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
  </defs>
</svg>
