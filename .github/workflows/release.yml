name: Release

on:
  push:
    tags:
      - 'v*'

# Secrets necessários no repositório GitHub (Settings > Secrets > Actions):
#   TAURI_SIGNING_PRIVATE_KEY         — chave privada minisign (gerada via `tauri signer generate`)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — senha da chave privada

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: '--target x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libcups2-dev

      - name: install frontend dependencies
        run: pnpm install

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SQLX_OFFLINE: true
        with:
          tagName: v__VERSION__
          releaseName: 'PrintControl v__VERSION__'
          releaseBody: 'Consulte os ativos abaixo para instalar o PrintControl em seu sistema.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
